<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>말랑pick</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Memoment';src:url('MemomentKkukkukk.ttf') format('truetype')}
@font-face{font-family:'BMKkubulim';src:url('BMKkubulimTTF.ttf') format('truetype')}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Noto Sans KR",sans-serif;font-weight:300;background:#fff0f5;color:#1a1a2e;display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* NAV */
.nav{background:linear-gradient(135deg,#ff6b9d,#ff4081);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 4px 16px rgba(255,64,129,.3)}
.logo{font-family:'Memoment',sans-serif;font-size:20px;color:#fff;cursor:pointer}
.logo em{color:#ffe0ec;font-style:normal}
.logo-sub{font-size:9px;color:rgba(255,255,255,.7);font-family:'Memoment',sans-serif;font-weight:300;margin-top:-3px}
.cart-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:24px;padding:6px 14px;font-size:12px;font-family:'Memoment',sans-serif;cursor:pointer}
.cart-n{background:#fff;color:#ff4081;border-radius:50%;width:18px;height:18px;min-width:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}

/* SCREENS */
.body{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:#fff0f5}
.screen.on{display:block}

/* TABBAR */
.tabbar{flex-shrink:0;background:#fff;border-top:1px solid rgba(255,180,210,.3);display:flex;height:58px;box-shadow:0 -4px 16px rgba(255,64,129,.06)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;font-family:'Memoment',sans-serif;font-size:12px;font-weight:300;color:#ffb3cd;transition:color .2s}
.tab.on{color:#ff4081;font-weight:400}

.hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,100,160,.4),rgba(255,64,129,.25));pointer-events:none}
.hero-slides{position:relative;z-index:1;padding:28px 20px 14px;text-align:center;min-height:150px;display:flex;flex-direction:column;justify-content:center;cursor:pointer}
.hslide{display:none}
.hslide.on{display:flex;flex-direction:column;align-items:center;justify-content:center;animation:sIn .4s ease}
@keyframes sIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.hero-dots{position:relative;z-index:1;display:flex;gap:6px;justify-content:center;padding-bottom:16px}
.hdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:all .3s;cursor:pointer}
.hdot.on{width:20px;border-radius:3px;background:#fff}

/* 카테고리 */
.catbar{background:#fff;padding:10px 14px;border-bottom:1px solid rgba(255,180,210,.15);position:sticky;top:0;z-index:40}

function gi(p){return p.img&&IMGS[p.img]?IMGS[p.img]:null;}

// 화면전환
function goScreen(n){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('screen-'+n).classList.add('on');
  document.getElementById('tab-'+n).classList.add('on');
  document.getElementById('screen-'+n).scrollTop=0;
}

// 카트
var cart=new Set();
function toggleCart(id){
  if(cart.has(id))cart.delete(id);else cart.add(id);
  updateUI();renderPickGrid();renderGrid();
}
function toggleCartGrid(id){
  if(cart.has(id))cart.delete(id);else cart.add(id);
  updateUI();renderGrid();renderPickGrid();
}
function updateUI(){
  var n=cart.size;
  document.getElementById('cart-count').textContent=n;
  document.getElementById('step1-next').disabled=n===0;
  var bar=document.getElementById('cart-bar');
  if(n===0){bar.style.display='none';return;}
  bar.style.display='flex';
  document.getElementById('cbar-n').textContent=n;
  document.getElementById('cbar-names').textContent=PRODUCTS.filter(function(p){return cart.has(p.id);}).map(function(p){return p.name;}).join(', ');
}
function removeCart(id){
  cart.delete(id);updateUI();renderPickGrid();renderGrid();renderCartList();
  var cp=document.getElementById('cart-panel-count');if(cp)cp.textContent=cart.size+'개';
  if(cart.size===0){goStep(1);return;}
  renderResults();
}

// 슬라이드
var curSlide=0,totalSlides=4,slideTimer=null;
function showSlide(n){
  document.getElementById('slide-'+curSlide).classList.remove('on');
  document.getElementById('dot-'+curSlide).classList.remove('on');
  curSlide=(n+totalSlides)%totalSlides;
  document.getElementById('slide-'+curSlide).classList.add('on');
  document.getElementById('dot-'+curSlide).classList.add('on');
}
function nextSlide(){clearInterval(slideTimer);showSlide(curSlide+1);startSlideTimer();}
function startSlideTimer(){slideTimer=setInterval(function(){showSlide(curSlide+1);},3500);}
(function(){
  var el=document.getElementById('hero-slides');
  if(!el)return;
  var sx=0;
  el.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});
  el.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>40){clearInterval(slideTimer);showSlide(dx<0?curSlide+1:curSlide-1);startSlideTimer();}
  },{passive:true});
})();
startSlideTimer();

// STEP
function goStep(n){
  document.getElementById('step-1').style.display=n===1?'block':'none';
  document.getElementById('step-2').style.display=n===2?'block':'none';
  var s1=document.getElementById('si-1'),s2=document.getElementById('si-2'),sl=document.getElementById('sl-1');
  s1.className='scirc '+(n===1?'active':'done');
  s2.className='scirc '+(n===2?'active':'todo');
  sl.className='sline'+(n===2?' done':'');
  if(n===2){renderCartList();renderResults();var cp=document.getElementById('cart-panel-count');if(cp)cp.textContent=cart.size+'개';}
  document.getElementById('screen-pick').scrollTop=0;
}

// 픽 그리드
var pickCat='전체';
function setPickCat(cat,btn){
  pickCat=cat;
  document.querySelectorAll('#pick-cat-row .chip').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');renderPickGrid();
}
function renderPickGrid(){
  var list=pickCat==='전체'?PRODUCTS:PRODUCTS.filter(function(p){return p.cat===pickCat;});
  document.getElementById('pick-grid').innerHTML=list.map(function(p){
    var sel=cart.has(p.id),img=gi(p),bg=gb(p);
    return '<div class="pcard2'+(sel?' sel':'')+'" onclick="toggleCart('+p.id+')"><div class="pwrap '+bg+'">'+(img?'<img src="'+img+'" alt="'+p.name+'">':'<span style="font-size:30px;position:relative;z-index:1">'+ge(p)+'</span>')+'<div class="pchk">✓</div></div><div class="p2body"><div class="p2cat">'+p.cat+'</div><div class="p2name">'+p.name+'</div></div></div>';
  }).join('');
}

// 카트 목록
function renderCartList(){
  var items=PRODUCTS.filter(function(p){return cart.has(p.id);});
  var el=document.getElementById('cart-list');
  if(!items.length){el.innerHTML='<div style="text-align:center;padding:32px;color:#ffb3cd;font-family:Memoment,sans-serif">담은 말랑이가 없어요</div>';return;}
  el.innerHTML=items.map(function(p){
    var img=gi(p),bg=gb(p);
    var sc=p.sellers.map(function(sv){
      var s=SELLERS[sv.id];
      var pb=s.plat.map(function(pl){return pl==='xhs'?'<span class="plsm plsm-xhs">小</span>':'<span class="plsm plsm-tao">T</span>';}).join('');
      var note=sv.note?'<div style="font-size:9px;color:#ff8c00;margin-top:3px;font-family:Memoment,sans-serif">⚠ '+sv.note+'</div>':'';
      return '<div class="csicard"><div class="csihd"><div class="csiav">'+s.av+'</div><div class="csinm">'+s.name+'</div><span class="csiprice">'+fmtKrw(sv.cny)+'</span><span class="csicny">'+sv.cny+'위안</span></div><div class="csitags">'+s.tags.map(function(t){return '<span class="csitag">'+t+'</span>';}).join('')+pb+'</div>'+note+'</div>';
    }).join('');
    return '<div class="citem"><div class="citem-top"><div class="cimg '+bg+'">'+(img?'<img src="'+img+'" alt="'+p.name+'">':'<span>'+ge(p)+'</span>')+'</div><div style="flex:1"><div class="cnm">'+p.name+'</div><div class="ccat">'+p.cat+' · '+p.sellers.length+'곳</div></div><button class="cdel" onclick="removeCart('+p.id+')">빼기</button></div><button class="ctoggle" onclick="toggleSI(this)">판매자 보기 ▾</button><div class="csinfo">'+sc+'</div></div>';
  }).join('');
}

// 추천
function renderResults(){
  var ci=PRODUCTS.filter(function(p){return cart.has(p.id);}),total=ci.length;
  document.getElementById('step3-sub').textContent=total+'개 기준 · 최적 판매자를 찾았어요.';
  var sids=Object.keys(SELLERS);
  var singles=sids.map(function(sid){
    var av=ci.filter(function(p){return p.sellers.some(function(sv){return sv.id===sid;});});
    var tc=av.reduce(function(s,p){var sv=p.sellers.find(function(sv){return sv.id===sid;});return s+(sv?parseFloat(sv.cny):0);},0);
    return{type:'single',sids:[sid],avail:av,unavail:ci.filter(function(p){return !p.sellers.some(function(sv){return sv.id===sid;});}),totalCny:tc,count:av.length};
  }).filter(function(r){return r.count>0;});
  var combos=[];
  for(var i=0;i<sids.length;i++){for(var j=i+1;j<sids.length;j++){
    var s1=sids[i],s2=sids[j];
    var av2=ci.filter(function(p){return p.sellers.some(function(sv){return sv.id===s1||sv.id===s2;});});
    var mx=Math.max((singles.find(function(r){return r.sids[0]===s1;})||{count:0}).count,(singles.find(function(r){return r.sids[0]===s2;})||{count:0}).count);
    if(av2.length<=mx)continue;
    var tc2=ci.reduce(function(sum,p){var v1=p.sellers.find(function(sv){return sv.id===s1;}),v2=p.sellers.find(function(sv){return sv.id===s2;});var b=[v1,v2].filter(Boolean).sort(function(a,b){return parseFloat(a.cny)-parseFloat(b.cny);});return sum+(b.length?parseFloat(b[0].cny):0);},0);
    combos.push({type:'combo',sids:[s1,s2],avail:av2,unavail:ci.filter(function(p){return !av2.some(function(q){return q.id===p.id;});}),totalCny:tc2,count:av2.length});
  }}
  var all=singles.concat(combos).sort(function(a,b){return b.count-a.count||a.totalCny-b.totalCny;}).slice(0,4);
  document.getElementById('result-list').innerHTML=all.map(function(r,idx){
    var ib=idx===0,pct=Math.round(r.count/total*100),tkrw=Math.round(r.totalCny*CNY),bkrw=Math.round(BAEDAE*CNY),grand=tkrw+bkrw;
    var chips=r.sids.map(function(sid){var s=SELLERS[sid];return '<div class="rchip"><div class="rav">'+s.av+'</div>'+s.name+'</div>';}).join('<span style="color:#ffd6e7;margin:0 1px">+</span>');
    var cd='';
    if(r.type==='combo'){cd='<div style="margin-bottom:9px">'+r.sids.map(function(sid){var s=SELLERS[sid];var mine=r.avail.filter(function(p){var sv=p.sellers.find(function(sv){return sv.id===sid;});if(!sv)return false;var ot=r.sids.filter(function(x){return x!==sid;});var om=ot.map(function(x){var ov=p.sellers.find(function(sv){return sv.id===x;});return ov?parseFloat(ov.cny):Infinity;});return parseFloat(sv.cny)<=Math.min.apply(null,om);});var mc=mine.reduce(function(s,p){var sv=p.sellers.find(function(sv){return sv.id===sid;});return s+(sv?parseFloat(sv.cny):0);},0);return '<div class="comborow"><strong>'+s.av+' '+s.name+'</strong> — '+mine.map(function(p){return p.name;}).join(', ')+' ('+mc.toFixed(1)+'위안)</div>';}).join('')+'</div>';}
    var lnks=r.sids.map(function(sid){var s=SELLERS[sid];return s.links.map(function(l){return '<a class="gobtn'+(l.cls==='btn-tao'?' tao':'')+'" href="'+l.url+'" target="_blank">'+s.name+' — '+l.label+' →</a>';}).join('');}).join('');
    return '<div class="rcard'+(ib?' best':'')+'"><div class="rhd"><div class="rchips">'+chips+'</div>'+(ib?'<span class="rbadge">최적 추천</span>':'')+'</div><div class="rbody"><div class="covbar"><div class="covfill" style="width:'+pct+'%"></div></div><div class="covtxt">'+total+'개 중 <strong style="color:#ff4081">'+r.count+'개</strong> 가능 ('+pct+'%)</div><div class="itags">'+r.avail.map(function(p){return '<span class="itag">'+p.name+'</span>';}).join('')+r.unavail.map(function(p){return '<span class="itag no">'+p.name+'</span>';}).join('')+'</div>'+cd+'<div class="pricebox"><div class="prow"><span>'+(r.type==='combo'?'두 판매자 합산':'말랑이 합계')+'</span><span>'+r.totalCny.toFixed(1)+'위안 ('+tkrw.toLocaleString()+'원)</span></div><div class="prow"><span>배대지 배송비</span><span>약 '+BAEDAE+'위안 ('+bkrw.toLocaleString()+'원)</span></div><div class="prow tot"><span>총 예상 금액</span><span>'+(r.totalCny+BAEDAE).toFixed(1)+'위안 ('+grand.toLocaleString()+'원)</span></div></div>'+lnks+'</div></div>';
  }).join('');
}

// 메인 그리드
var curCat='전체';
function setCat(cat,btn){
  curCat=cat;
  document.querySelectorAll('#cat-row .chip').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');renderGrid();
}
function renderGrid(){
  var q=(document.getElementById('search-q')||{}).value||'';
  var list=curCat==='전체'?PRODUCTS:PRODUCTS.filter(function(p){return p.cat===curCat;});
  if(q)list=list.filter(function(p){return p.name.includes(q);});
  var grid=document.getElementById('main-grid');
  if(!list.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:#ffb3cd;font-family:Memoment,sans-serif">검색 결과가 없어요</div>';return;}
  grid.innerHTML=list.map(function(p){
    var img=gi(p),bg=gb(p);
    var plats=[];
    p.sellers.forEach(function(sv){SELLERS[sv.id].plat.forEach(function(pl){if(plats.indexOf(pl)<0)plats.push(pl);});});
    var dots=plats.map(function(pl){return pl==='xhs'?'<span class="sdot sdot-xhs">小</span>':'<span class="sdot sdot-tao">T</span>';}).join('');
    var prices=p.sellers.map(function(s){return parseFloat(s.cny);}).filter(function(n){return !isNaN(n);});
    var mc=prices.length?Math.min.apply(null,prices):null;
    var inCart=cart.has(p.id);
    return '<div class="pcard"><div class="pimg '+bg+'" onclick="openModal('+p.id+')" style="cursor:pointer">'+(img?'<img src="'+img+'" alt="'+p.name+'">':'<span class="pemoji">'+ge(p)+'</span>')+'<div class="sdots">'+dots+'</div></div><div class="pbody"><div class="pcat">'+p.cat+'</div><div class="pname" onclick="openModal('+p.id+')" style="cursor:pointer">'+p.name+'</div>'+(mc!==null?'<div class="pprice">'+fmtKrw(mc.toString())+'~</div>':'')+'<div class="psub">판매자 '+p.sellers.length+'곳</div><button class="padd '+(inCart?'on':'off')+'" onclick="toggleCartGrid('+p.id+')">'+(inCart?'✓ 담겨있어요':'+ 담기')+'</button></div></div>';
  }).join('');
}

// 판매자 페이지
function renderSellerPage(){
  var frow=document.getElementById('sfilter-row');
  var ab=document.createElement('button');ab.className='sfchip on';ab.textContent='전체 보기';ab.onclick=function(){setSeller('all',this);};frow.appendChild(ab);
  Object.keys(SELLERS).forEach(function(sid){var s=SELLERS[sid],btn=document.createElement('button');btn.className='sfchip';btn.textContent=s.av+' '+s.name;btn.onclick=function(){setSeller(sid,this);};frow.appendChild(btn);});
  renderSellerSections('all');
}
function setSeller(sid,btn){document.querySelectorAll('.sfchip').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');renderSellerSections(sid);}
function renderSellerSections(sid){
  var wrap=document.getElementById('seller-sections');
  var ts=sid==='all'?Object.keys(SELLERS):[sid];
  wrap.innerHTML=ts.map(function(s){
    var seller=SELLERS[s];
    var prods=PRODUCTS.filter(function(p){return p.sellers.some(function(sv){return sv.id===s;});});
    var pb=seller.plat.map(function(pl){return pl==='xhs'?'<span class="pbadge pbadge-xhs">샤오홍수</span>':'<span class="pbadge pbadge-tao">타오바오</span>';}).join('');
    var lb=seller.links.map(function(l){return '<a class="slnk slnk-'+(l.cls==='btn-tao'?'tao':'xhs')+'" href="'+l.url+'" target="_blank">'+l.label+' →</a>';}).join('');
    var cards=prods.map(function(p){var img=gi(p),bg=gb(p),sv=p.sellers.find(function(sv){return sv.id===s;});return '<div class="spcard" onclick="openModal('+p.id+')"><div class="spimg '+bg+'">'+(img?'<img src="'+img+'" alt="'+p.name+'">':'<span style="font-size:26px">'+ge(p)+'</span>')+'</div><div class="spbody"><div class="spname">'+p.name+'</div>'+(sv?'<div class="spprice">'+fmtKrw(sv.cny)+'</div>':'')+'</div></div>';}).join('');
    return '<div class="scard"><div class="scard-hd"><div class="sav">'+seller.av+'</div><div class="sinfo"><div class="snm">'+seller.name+'</div><div class="smt">'+seller.meta+'</div><div class="stags">'+seller.tags.map(function(t){return '<span class="stag">'+t+'</span>';}).join('')+'</div></div><div class="splat">'+pb+'</div></div><div class="sdesc">'+seller.desc+'</div><div class="slinks">'+lb+'</div><div class="sprodsscroll">'+cards+'</div></div>';
  }).join('');
}

// 모달
function openModal(id){
  var p=PRODUCTS[id];
  document.getElementById('m-title').textContent=p.name;
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-desc').textContent='각 판매자별 파츠·크기·가격이 다를 수 있어요.';
  var img=gi(p),thumb=document.getElementById('m-thumb');
  thumb.className='mthumb '+gb(p);
  thumb.innerHTML=img?'<img src="'+img+'" alt="'+p.name+'">'
    :'<span style="font-size:44px">'+ge(p)+'</span>';
  document.getElementById('m-sellers').innerHTML=p.sellers.map(function(sv){
    var s=SELLERS[sv.id];

    var pb=s.plat.includes('xhs')?'<span class="pbadge pbadge-xhs">샤오홍수</span>':'<span class="pbadge pbadge-tao">타오바오</span>';
    var note=sv.note?'<div class="sonote">'+sv.note+'</div>':'';
    var lb=s.links.map(function(l){return '<a class="sobtn '+l.cls+'" href="'+l.url+'" target="_blank">'+l.label+' →</a>';}).join('');
    return '<div class="socard"><div class="sohd"><div class="soav">'+s.av+'</div><div><div class="sonm">'+s.name+'</div><div class="somt">'+s.meta+'</div></div>'+pb+'<div class="soprices"><div class="sokrw">'+fmtKrw(sv.cny)+'</div><div class="socny">'+fmtCny(sv.cny)+'</div></div></div><div class="sodesc">'+s.desc+'</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px">'+s.tags.map(function(t){return '<span class="csitag">'+t+'</span>';}).join('')+'</div>'+note+'<div class="sobtns">'+lb+'</div></div>';
  }).join('');
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function toggleSI(btn){
  var info=btn.nextElementSibling;
  var isOpen=info.classList.toggle('open');
  btn.textContent=isOpen?'판매자 닫기 ▴':'판매자 보기 ▾';
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');document.body.style.overflow='';}

renderPickGrid();
renderGrid();
renderSellerPage();
</script>
</body>
</html>
