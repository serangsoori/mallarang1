<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>말랑pick</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Memoment';src:url('MemomentKkukkukk.ttf') format('truetype')}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:"Noto Sans KR",sans-serif;background:#fff0f5;color:#1a1a2e;display:flex;flex-direction:column}

/* ── 상단 헤더 ── */
.app-header{
  flex-shrink:0;
  background:linear-gradient(135deg,#ff6b9d,#ff4081);
  padding:14px 20px 12px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(255,64,129,.3);
  position:relative;z-index:100
}
.app-logo{font-family:'Memoment',sans-serif;font-size:22px;color:#fff;cursor:pointer}
.app-logo em{color:#ffe0ec;font-style:normal}
.app-header-right{display:flex;align-items:center;gap:10px}
.cart-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.22);color:#fff;
  border:1.5px solid rgba(255,255,255,.4);
  border-radius:24px;padding:6px 14px;
  font-size:12px;font-weight:700;cursor:pointer;
  backdrop-filter:blur(8px)
}
.cart-pill-count{
  background:#fff;color:#ff4081;border-radius:50%;
  width:18px;height:18px;min-width:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800
}

/* ── 스크롤 컨테이너 ── */
.app-body{flex:1;overflow:hidden;position:relative}
.app-screen{
  position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;
  background:#fff0f5
}
.app-screen.on{display:block}

/* ── 하단 탭바 ── */
.tab-bar{
  flex-shrink:0;
  background:#fff;
  border-top:1px solid #ffe0ec;
  display:flex;align-items:stretch;
  height:62px;
  box-shadow:0 -4px 20px rgba(255,64,129,.08);
  position:relative;z-index:100
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;border:none;background:none;
  font-family:inherit;transition:all .2s;padding:8px 0
}
.tab-icon{display:none}
.tab-label{font-size:13px;font-weight:700;color:#ffb3cd;transition:color .2s}
.tab-item.on .tab-label{color:#ff4081}
.tab-item.on .tab-icon{transform:scale(1.15)}

/* ── 홈 화면 ── */
.home-hero{
  background:linear-gradient(145deg,#ff6b9d 0%,#ff4081 55%,#f50057 100%);
  padding:24px 20px 24px;position:relative;overflow:hidden
}
.home-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.07)}
.home-hero::after{content:'';position:absolute;bottom:-70px;left:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05)}
.home-hero-title{
  font-family:'Memoment',sans-serif;font-size:28px;color:#fff;
  line-height:1.35;margin-bottom:8px;position:relative;z-index:1
}
.home-hero-sub{font-size:13px;color:rgba(255,255,255,.85);line-height:1.8;margin-bottom:16px;position:relative;z-index:1;font-family:'Memoment',sans-serif}
.home-notice{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:14px;padding:11px 15px;font-size:11px;color:#fff;
  line-height:1.85;backdrop-filter:blur(8px);position:relative;z-index:1
}
.home-notice strong{color:#ffe0ec}

/* 검색바 */
.search-bar{
  background:#fff;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid #fff0f5;
  position:sticky;top:0;z-index:50
}
.search-inner{
  flex:1;display:flex;align-items:center;gap:8px;
  background:#fff0f5;border-radius:24px;padding:9px 16px
}
.search-inner input{border:none;background:none;font-size:13px;font-family:inherit;outline:none;flex:1;color:#1a1a2e}
.search-inner input::placeholder{color:#ffb3cd}

/* 카테고리 스크롤 */
.cat-bar{
  background:#fff;padding:10px 16px 12px;
  border-bottom:1px solid #fff0f5;
  position:sticky;top:53px;z-index:40
}
.cat-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{
  border:none;border-radius:24px;padding:6px 16px;
  font-size:12px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0;
  background:#fff0f5;color:#ff9dbf
}
.cat-chip.on{
  background:linear-gradient(135deg,#ff6b9d,#ff4081);
  color:#fff;box-shadow:0 4px 12px rgba(255,64,129,.3)
}

/* 제품 그리드 */
.grid-area{padding:12px 12px 20px}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pcard{
  border-radius:18px;overflow:hidden;background:#fff;cursor:pointer;
  box-shadow:0 2px 12px rgba(255,64,129,.08);
  transition:transform .15s,box-shadow .15s
}
.pcard:active{transform:scale(.96);box-shadow:0 1px 6px rgba(255,64,129,.1)}
.pcard-img{
  width:100%;aspect-ratio:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center
}
.pcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pcard-emoji{font-size:36px;position:relative;z-index:1}
.sdots{position:absolute;top:6px;left:6px;display:flex;gap:2px;z-index:2}
.sdot{font-size:8px;font-weight:700;padding:2px 5px;border-radius:6px;color:#fff}
.sdot-xhs{background:#ff4081}
.sdot-tao{background:#ff8c00}
.pcard-body{padding:8px 10px 10px}
.pcard-cat{font-size:9px;color:#ffb3cd;font-weight:700;margin-bottom:1px;letter-spacing:.04em}
.pcard-name{font-size:11px;font-weight:700;color:#1a1a2e;line-height:1.3;margin-bottom:4px}
.pcard-price{font-size:12px;font-weight:800;color:#ff4081}
.pcard-add{
  width:100%;border:none;border-radius:10px;padding:6px;
  font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:5px;transition:all .2s
}
.pcard-add.off{background:#fff0f5;color:#ff9dbf}
.pcard-add.on{background:linear-gradient(135deg,#ff6b9d,#ff4081);color:#fff}

.bg-crunch{background:linear-gradient(135deg,#fff9e6,#fff0cc)}
.bg-transparent{background:linear-gradient(135deg,#e8f4fd,#dbeeff)}
.bg-kuma{background:linear-gradient(135deg,#eef3fe,#dde8ff)}
.bg-squishy{background:linear-gradient(135deg,#fff0e8,#ffe0cc)}
.bg-slang{background:linear-gradient(135deg,#fff0f4,#ffd6e7)}
.bg-etc{background:linear-gradient(135deg,#f0faf0,#dff5df)}

/* ── 판매자 화면 ── */
.seller-header{
  background:linear-gradient(135deg,#ff6b9d,#ff4081);
  padding:20px;
  position:sticky;top:0;z-index:50
}
.seller-header-title{font-family:'Memoment',sans-serif;font-size:20px;color:#fff;margin-bottom:2px}
.seller-header-sub{font-size:11px;color:rgba(255,255,255,.75)}
.seller-filter-bar{
  background:#fff;padding:10px 16px 12px;
  position:sticky;top:72px;z-index:40;
  border-bottom:1px solid #fff0f5
}
.seller-filter-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.seller-filter-scroll::-webkit-scrollbar{display:none}
.sf-chip{
  border:1.5px solid #ffd6e7;border-radius:24px;padding:6px 14px;
  font-size:11px;font-weight:600;background:#fff;color:#ff9dbf;
  cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0
}
.sf-chip.on{background:linear-gradient(135deg,#ff6b9d,#ff4081);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(255,64,129,.3)}
.seller-list{padding:12px}
.seller-card{
  background:#fff;border-radius:20px;margin-bottom:14px;
  box-shadow:0 3px 14px rgba(255,64,129,.08);overflow:hidden
}
.seller-card-hd{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:linear-gradient(135deg,#fff5f8,#ffe8f0)
}
.seller-card-av{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#ff6b9d,#ff4081);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;
  box-shadow:0 4px 12px rgba(255,64,129,.3)
}
.seller-card-info{flex:1}
.seller-card-name{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.seller-card-meta{font-size:11px;color:#ff9dbf;font-weight:600;margin-bottom:5px}
.seller-card-tags{display:flex;gap:5px;flex-wrap:wrap}
.sc-tag{background:#fff5f8;border:1px solid #ffd6e7;border-radius:20px;padding:2px 8px;font-size:10px;color:#ff9dbf;font-weight:600}
.seller-card-plat{display:flex;gap:4px;flex-direction:column;align-items:flex-end}
.plat-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:8px}
.plat-xhs{background:#fff0f4;border:1px solid #ff4081;color:#ff4081}
.plat-tao{background:#fff4e0;border:1px solid #ff8c00;color:#ff8c00}
.seller-card-desc{padding:10px 16px;font-size:12px;color:#888;line-height:1.65;border-bottom:1px solid #fff0f5}
.seller-card-links{display:flex;gap:8px;padding:10px 16px}
.s-link-btn{
  display:inline-flex;align-items:center;color:#fff;border:none;
  border-radius:16px;padding:7px 14px;font-size:11px;font-weight:700;
  font-family:inherit;cursor:pointer;text-decoration:none;flex:1;justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,.12)
}
.btn-xhs{background:linear-gradient(135deg,#ff6b9d,#ff4081)}
.btn-tao{background:linear-gradient(135deg,#ffb347,#ff8c00)}
.seller-prods-scroll{
  display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;
  padding:12px 16px 14px
}
.seller-prods-scroll::-webkit-scrollbar{display:none}
.s-prod-card{
  flex-shrink:0;width:120px;border-radius:14px;overflow:hidden;background:#fff5f8;cursor:pointer;
  box-shadow:0 2px 8px rgba(255,64,129,.08);transition:transform .15s
}
.s-prod-card:active{transform:scale(.95)}
.s-prod-img{width:120px;height:100px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.s-prod-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.s-prod-body{padding:7px 9px 9px}
.s-prod-name{font-size:10px;font-weight:700;color:#1a1a2e;line-height:1.3;margin-bottom:3px}
.s-prod-price{font-size:11px;font-weight:800;color:#ff4081}

/* ── 추천 화면 ── */
.pick-header{
  background:linear-gradient(135deg,#ff6b9d,#ff4081);
  padding:20px;position:sticky;top:0;z-index:50
}
.pick-header-title{font-family:'Memoment',sans-serif;font-size:20px;color:#fff;margin-bottom:6px}
.step-bar{display:flex;align-items:center;gap:0}
.step-dot{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .3s}
.step-circle.done{background:rgba(255,255,255,.9);color:#ff4081}
.step-circle.active{background:#fff;color:#ff4081;box-shadow:0 0 0 4px rgba(255,255,255,.3)}
.step-circle.todo{background:rgba(255,255,255,.25);color:rgba(255,255,255,.7)}
.step-label{font-size:9px;color:rgba(255,255,255,.7);font-weight:600;white-space:nowrap}
.step-circle.active + .step-label, .step-dot.active-dot .step-label{color:#fff}
.step-line{height:2px;background:rgba(255,255,255,.25);flex:1;margin-top:-18px;transition:background .3s}
.step-line.done{background:rgba(255,255,255,.8)}

.pick-body{padding:14px 16px 20px}
.pick-sub-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.pick-sub-desc{font-size:12px;color:#ff9dbf;margin-bottom:14px;line-height:1.5}

/* 카트바 */
.cart-bar{
  display:none;background:linear-gradient(135deg,#ff6b9d,#ff4081);
  border-radius:16px;padding:11px 15px;margin-bottom:14px;
  align-items:center;justify-content:space-between;gap:10px;
  box-shadow:0 6px 20px rgba(255,64,129,.3)
}
.cart-bar-num{background:rgba(255,255,255,.25);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.cart-bar-names{font-size:11px;color:rgba(255,255,255,.85);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-bar-btn{background:rgba(255,255,255,.22);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:18px;padding:5px 13px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}

/* 픽 그리드 */
.pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:4px}
.pick-card{border:2px solid #ffe0ec;border-radius:14px;overflow:hidden;background:#fff;cursor:pointer;transition:all .2s;position:relative;box-shadow:0 2px 8px rgba(255,64,129,.06)}
.pick-card.selected{border-color:#ff4081;background:#fff8fb;box-shadow:0 4px 16px rgba(255,64,129,.2)}
.pick-card-imgwrap{width:100%;aspect-ratio:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pick-card-imgwrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pick-check{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#ff6b9d,#ff4081);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;z-index:2;box-shadow:0 2px 8px rgba(255,64,129,.4)}
.pick-card.selected .pick-check{opacity:1}
.pick-card-body{padding:6px 8px 8px}
.pick-card-cat{font-size:8.5px;color:#ffb3cd;font-weight:700;margin-bottom:1px}
.pick-card-name{font-size:10px;font-weight:700;color:#1a1a2e;line-height:1.3}

/* 버튼 */
.action-btn{width:100%;background:linear-gradient(135deg,#ff6b9d,#ff4081);color:#fff;border:none;border-radius:16px;padding:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:14px;box-shadow:0 6px 20px rgba(255,64,129,.35);transition:all .2s}
.action-btn:disabled{background:linear-gradient(135deg,#ffb3cc,#ffc0cb);box-shadow:none;cursor:not-allowed}
.ghost-btn{width:100%;background:none;border:1.5px solid #ffd6e7;border-radius:16px;padding:12px;font-size:13px;font-weight:600;color:#ff9dbf;font-family:inherit;cursor:pointer;margin-top:8px;transition:all .2s}
.ghost-btn:hover{border-color:#ff4081;color:#ff4081}

/* 카트 아이템 */
.cart-list{display:flex;flex-direction:column;gap:9px;margin-bottom:14px}
.cart-item{background:#fff;border:1.5px solid #ffe0ec;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(255,64,129,.06)}
.cart-item-top{display:flex;align-items:center;gap:10px;padding:10px 12px}
.cart-img{width:48px;height:48px;border-radius:10px;flex-shrink:0;background:#fff5f8;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;border:1px solid #ffe0ec}
.cart-img img{width:100%;height:100%;object-fit:cover}
.cart-info{flex:1}
.cart-name{font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:1px}
.cart-cat{font-size:10px;color:#ffb3cd;font-weight:600}
.cart-del{background:#fff5f8;border:1.5px solid #ffd6e7;border-radius:18px;padding:4px 10px;font-size:10px;color:#ff9dbf;cursor:pointer;font-family:inherit;flex-shrink:0;font-weight:600;transition:all .2s}
.cart-del:active{border-color:#ff4081;color:#ff4081}
.cart-seller-toggle{width:100%;background:none;border:none;border-top:1px solid #fff5f8;padding:7px 12px;font-size:10px;color:#ff9dbf;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;gap:3px}
.cart-seller-info{display:none;padding:8px 12px 12px;border-top:1px solid #fff5f8;background:#fff8fb}
.cart-seller-info.open{display:block}
.csi-card{background:#fff;border:1px solid #ffe0ec;border-radius:10px;padding:8px 10px;margin-bottom:6px}
.csi-card:last-child{margin-bottom:0}
.csi-hd{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.csi-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#ff6b9d,#ff4081);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.csi-nm{font-size:11px;font-weight:700;color:#1a1a2e}
.csi-price{margin-left:auto;font-size:11px;font-weight:800;color:#ff4081}
.csi-cny{font-size:9px;color:#ccc;margin-left:3px}
.csi-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.csi-tag{background:#fff5f8;border:1px solid #ffd6e7;border-radius:20px;padding:1px 6px;font-size:9px;color:#ff9dbf;font-weight:600}
.plat-sm{font-size:8px;font-weight:700;padding:1px 6px;border-radius:6px}
.plat-sm-xhs{background:#fff0f4;border:1px solid #ff4081;color:#ff4081}
.plat-sm-tao{background:#fff4e0;border:1px solid #ff8c00;color:#ff8c00}

/* 추천 결과 */
.result-cards{display:flex;flex-direction:column;gap:12px}
.result-card{border:2px solid #ffe0ec;border-radius:18px;overflow:hidden;background:#fff;box-shadow:0 3px 12px rgba(255,64,129,.07)}
.result-card.best{border-color:#ff4081;box-shadow:0 6px 22px rgba(255,64,129,.18)}
.result-hd{display:flex;align-items:center;gap:9px;padding:12px 14px;background:linear-gradient(135deg,#fff5f8,#ffe8f0);border-bottom:1px solid #ffe0ec}
.result-badge{background:linear-gradient(135deg,#ff6b9d,#ff4081);color:#fff;font-size:9px;font-weight:700;padding:3px 9px;border-radius:10px;flex-shrink:0;box-shadow:0 2px 8px rgba(255,64,129,.3)}
.result-chips{display:flex;gap:7px;flex:1;flex-wrap:wrap;align-items:center}
.result-chip{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#1a1a2e}
.result-av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#ff6b9d,#ff4081);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.result-body{padding:12px 14px}
.cov-bar{height:5px;background:#ffe0ec;border-radius:3px;margin-bottom:7px;overflow:hidden}
.cov-fill{height:100%;background:linear-gradient(90deg,#ff6b9d,#ff4081);border-radius:3px;transition:width .6s ease}
.cov-text{font-size:11px;color:#ff9dbf;margin-bottom:9px;font-weight:600}
.item-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.itag{background:#fff5f8;border:1px solid #ffe0ec;border-radius:18px;padding:2px 8px;font-size:10px;color:#1a1a2e;font-weight:600}
.itag.no{background:#f8f8f8;border-color:#eee;color:#ccc;text-decoration:line-through}
.combo-detail{margin-bottom:9px}
.combo-row{font-size:10px;color:#ff9dbf;padding:6px 10px;background:#fff5f8;border-radius:9px;border:1px solid #ffe0ec;margin-bottom:4px;font-weight:600}
.price-box{background:linear-gradient(135deg,#fff5f8,#ffe8f0);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.price-row{display:flex;justify-content:space-between;font-size:11px;color:#ff9dbf;margin-bottom:3px;font-weight:600}
.price-row.total{margin-bottom:0;font-weight:800;font-size:12px;color:#1a1a2e;border-top:1px solid #ffd6e7;padding-top:7px;margin-top:5px}
.go-btn{display:block;width:100%;background:linear-gradient(135deg,#ff6b9d,#ff4081);color:#fff;border:none;border-radius:12px;padding:11px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;text-align:center;margin-bottom:5px;box-shadow:0 3px 12px rgba(255,64,129,.28)}
.go-btn.tao{background:linear-gradient(135deg,#ffb347,#ff8c00)}

/* ── 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,26,46,.55);backdrop-filter:blur(5px);z-index:500;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex;animation:slideUp .28s cubic-bezier(.34,1.56,.64,1)}

const BAEDAE=22;
const CAT_BG={'크런치':'bg-crunch','투명':'bg-transparent','쿠마':'bg-kuma','스퀴시':'bg-squishy','슬랑이':'bg-slang','꺼만말':'bg-slang','기타':'bg-etc'};
function getImg(p){return p.img&&IMGS[p.img]?IMGS[p.img]:null;}
function getEmoji(p){return p.emoji||p.name.charAt(0);}
function getBg(p){return CAT_BG[p.cat]||'bg-etc';}

// 화면 전환
function goScreen(name){
  document.querySelectorAll('.app-screen').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.tab-item').forEach(function(t){t.classList.remove('on');});
  document.getElementById('screen-'+name).classList.add('on');
  document.getElementById('tab-'+name).classList.add('on');
  document.getElementById('screen-'+name).scrollTop=0;
}

// 카트
var cart=new Set();
function toggleCart(id){
  if(cart.has(id))cart.delete(id);else cart.add(id);
  updateCartUI();renderPickGrid();renderGrid();
}
function toggleCartFromGrid(id){
  if(cart.has(id))cart.delete(id);else cart.add(id);
  updateCartUI();renderGrid();renderPickGrid();
}
function updateCartUI(){
  var n=cart.size;
  document.getElementById('cart-count').textContent=n;
  document.getElementById('step1-next').disabled=n===0;
  var bar=document.getElementById('cart-bar');
  if(n===0){bar.style.display='none';return;}
  bar.style.display='flex';
  document.getElementById('cart-bar-count').textContent=n;
  document.getElementById('cart-bar-names').textContent=PRODUCTS.filter(function(p){return cart.has(p.id);}).map(function(p){return p.name;}).join(', ');
}
function removeFromCart(id){
  cart.delete(id);updateCartUI();renderPickGrid();renderGrid();renderCartList();
  var cp=document.getElementById('cart-panel-count');
  if(cp)cp.textContent=cart.size+'개';
  if(cart.size===0){goStep(1);return;}
  renderResults();
}

// STEP 전환
function goStep(n){
  document.getElementById('step-1').style.display=n===1?'block':'none';
  document.getElementById('step-2').style.display=n===2?'block':'none';
  var s1=document.getElementById('si-1'),s2=document.getElementById('si-2'),sl1=document.getElementById('sl-1');
  s1.className='step-circle '+(n===1?'active':'done');
  s2.className='step-circle '+(n===2?'active':'todo');
  sl1.className='step-line'+(n===2?' done':'');
  if(n===2){
    renderCartList();renderResults();
    var cp=document.getElementById('cart-panel-count');
    if(cp)cp.textContent=cart.size+'개';
  }
  document.getElementById('screen-pick').scrollTop=0;
}

// STEP 1 픽 그리드
var pickCat='전체';
function setPickCat(cat,btn){
  pickCat=cat;
  document.querySelectorAll('#pick-cat-row .cat-chip').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');renderPickGrid();
}
function renderPickGrid(){
  var list=pickCat==='전체'?PRODUCTS:PRODUCTS.filter(function(p){return p.cat===pickCat;});
  document.getElementById('pick-grid').innerHTML=list.map(function(p){
    var sel=cart.has(p.id),img=getImg(p),bg=getBg(p);
    return '<div class="pick-card'+(sel?' selected':'')+'" onclick="toggleCart('+p.id+')">' +
      '<div class="pick-card-imgwrap '+bg+'">' +
        (img?'<img src="'+img+'" alt="'+p.name+'">'
            :'<span style="font-size:30px;position:relative;z-index:1">'+getEmoji(p)+'</span>') +
        '<div class="pick-check">✓</div>' +
      '</div>' +
      '<div class="pick-card-body"><div class="pick-card-cat">'+p.cat+'</div><div class="pick-card-name">'+p.name+'</div></div>' +
    '</div>';
  }).join('');
}

// STEP 2 카트
function renderCartList(){
  var items=PRODUCTS.filter(function(p){return cart.has(p.id);});
  var el=document.getElementById('cart-list');
  if(!items.length){el.innerHTML='<div style="text-align:center;padding:32px;color:#ffb3cd;font-weight:600">담은 말랑이가 없어요</div>';return;}
  el.innerHTML=items.map(function(p){
    var img=getImg(p),bg=getBg(p);
    var scards=p.sellers.map(function(sv){
      var s=SELLERS[sv.id];
      var pb=s.plat.map(function(pl){return pl==='xhs'?'<span class="plat-sm plat-sm-xhs">샤오홍수</span>':'<span class="plat-sm plat-sm-tao">타오바오</span>';}).join('');
      var note=sv.note?'<div style="font-size:9px;color:#ff8c00;margin-top:3px;font-weight:600">⚠ '+sv.note+'</div>':'';
      return '<div class="csi-card"><div class="csi-hd"><div class="csi-av">'+s.av+'</div><div class="csi-nm">'+s.name+'</div><span class="csi-price">'+fmtKrw(sv.cny)+'</span><span class="csi-cny">'+sv.cny+'위안</span></div><div class="csi-tags">'+s.tags.map(function(t){return '<span class="csi-tag">'+t+'</span>';}).join('')+pb+'</div>'+note+'</div>';
    }).join('');
    return '<div class="cart-item"><div class="cart-item-top"><div class="cart-img '+bg+'">'+(img?'<img src="'+img+'" alt="'+p.name+'">':'<span>'+getEmoji(p)+'</span>')+'</div><div class="cart-info"><div class="cart-name">'+p.name+'</div><div class="cart-cat">'+p.cat+' · '+p.sellers.length+'곳</div></div><button class="cart-del" onclick="removeFromCart('+p.id+')">빼기</button></div><button class="cart-seller-toggle" onclick="toggleSellerInfo(this)">판매자 정보 보기 ▾</button><div class="cart-seller-info">'+scards+'</div></div>';
  }).join('');
}
function toggleSellerInfo(btn){
  var info=btn.nextElementSibling,open=info.classList.toggle('open');
  btn.textContent=open?'판매자 정보 닫기 ▴':'판매자 정보 보기 ▾';
}

// 추천
function renderResults(){
  var ci=PRODUCTS.filter(function(p){return cart.has(p.id);}),total=ci.length;
  document.getElementById('step3-sub').textContent=total+'개 기준 · 최적 판매자를 찾았어요.';
  var sids=Object.keys(SELLERS);
  var singles=sids.map(function(sid){
    var av=ci.filter(function(p){return p.sellers.some(function(sv){return sv.id===sid;});});
    var tc=av.reduce(function(s,p){var sv=p.sellers.find(function(sv){return sv.id===sid;});return s+(sv?parseFloat(sv.cny):0);},0);
    return{type:'single',sids:[sid],avail:av,unavail:ci.filter(function(p){return !p.sellers.some(function(sv){return sv.id===sid;});}),totalCny:tc,count:av.length};
  }).filter(function(r){return r.count>0;});
  var combos=[];
  for(var i=0;i<sids.length;i++){for(var j=i+1;j<sids.length;j++){
    var s1=sids[i],s2=sids[j];
    var av2=ci.filter(function(p){return p.sellers.some(function(sv){return sv.id===s1||sv.id===s2;});});
    var mx=Math.max((singles.find(function(r){return r.sids[0]===s1;})||{count:0}).count,(singles.find(function(r){return r.sids[0]===s2;})||{count:0}).count);
    if(av2.length<=mx)continue;
    var tc2=ci.reduce(function(sum,p){var v1=p.sellers.find(function(sv){return sv.id===s1;}),v2=p.sellers.find(function(sv){return sv.id===s2;});var b=[v1,v2].filter(Boolean).sort(function(a,b){return parseFloat(a.cny)-parseFloat(b.cny);});return sum+(b.length?parseFloat(b[0].cny):0);},0);
    combos.push({type:'combo',sids:[s1,s2],avail:av2,unavail:ci.filter(function(p){return !av2.some(function(q){return q.id===p.id;});}),totalCny:tc2,count:av2.length});
  }}
  var all=singles.concat(combos).sort(function(a,b){return b.count-a.count||a.totalCny-b.totalCny;}).slice(0,4);
  document.getElementById('result-list').innerHTML=all.map(function(r,idx){
    var ib=idx===0,pct=Math.round(r.count/total*100),tkrw=Math.round(r.totalCny*CNY),bkrw=Math.round(BAEDAE*CNY),grand=tkrw+bkrw;
    var chips=r.sids.map(function(sid){var s=SELLERS[sid];return '<div class="result-chip"><div class="result-av">'+s.av+'</div>'+s.name+'</div>';}).join('<span style="color:#ffd6e7;margin:0 1px">+</span>');
    var cd='';
    if(r.type==='combo'){cd='<div class="combo-detail">'+r.sids.map(function(sid){var s=SELLERS[sid];var mine=r.avail.filter(function(p){var sv=p.sellers.find(function(sv){return sv.id===sid;});if(!sv)return false;var ot=r.sids.filter(function(x){return x!==sid;});var om=ot.map(function(x){var ov=p.sellers.find(function(sv){return sv.id===x;});return ov?parseFloat(ov.cny):Infinity;});return parseFloat(sv.cny)<=Math.min.apply(null,om);});var mc=mine.reduce(function(s,p){var sv=p.sellers.find(function(sv){return sv.id===sid;});return s+(sv?parseFloat(sv.cny):0);},0);return '<div class="combo-row"><strong>'+s.av+' '+s.name+'</strong> — '+mine.map(function(p){return p.name;}).join(', ')+' ('+mc.toFixed(1)+'위안)</div>';}).join('')+'</div>';}
    var links=r.sids.map(function(sid){var s=SELLERS[sid];return s.links.map(function(l){return '<a class="go-btn'+(l.cls==='btn-tao'?' tao':'')+'" href="'+l.url+'" target="_blank">'+s.name+' — '+l.label+' →</a>';}).join('');}).join('');
    return '<div class="result-card'+(ib?' best':'')+'"><div class="result-hd"><div class="result-chips">'+chips+'</div>'+(ib?'<span class="result-badge">최적 추천</span>':'')+'</div><div class="result-body"><div class="cov-bar"><div class="cov-fill" style="width:'+pct+'%"></div></div><div class="cov-text">'+total+'개 중 <strong style="color:#ff4081">'+r.count+'개</strong> 가능 ('+pct+'%)</div><div class="item-tags">'+r.avail.map(function(p){return '<span class="itag">'+p.name+'</span>';}).join('')+r.unavail.map(function(p){return '<span class="itag no">'+p.name+'</span>';}).join('')+'</div>'+cd+'<div class="price-box"><div class="price-row"><span>'+(r.type==='combo'?'두 판매자 합산':'말랑이 합계')+'</span><span>'+r.totalCny.toFixed(1)+'위안 ('+tkrw.toLocaleString()+'원)</span></div><div class="price-row"><span>배대지 배송비</span><span>약 '+BAEDAE+'위안 ('+bkrw.toLocaleString()+'원)</span></div><div class="price-row total"><span>총 예상 금액</span><span>'+(r.totalCny+BAEDAE).toFixed(1)+'위안 ('+grand.toLocaleString()+'원)</span></div></div>'+links+'</div></div>';
  }).join('');
}

// 말랑이 그리드
var curCat='전체';
function setCat(cat,btn){
  curCat=cat;
  document.querySelectorAll('#items-cat-row .cat-chip').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');renderGrid();
}
function renderGrid(){
  var q=(document.getElementById('search-q')||{}).value||'';
  var list=curCat==='전체'?PRODUCTS:PRODUCTS.filter(function(p){return p.cat===curCat;});
  if(q)list=list.filter(function(p){return p.name.includes(q);});
  var grid=document.getElementById('main-grid');
  if(!list.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:#ffb3cd;font-weight:600">검색 결과가 없어요</div>';return;}
  grid.innerHTML=list.map(function(p){
    var img=getImg(p),bg=getBg(p);
    var plats=[];
    p.sellers.forEach(function(sv){SELLERS[sv.id].plat.forEach(function(pl){if(plats.indexOf(pl)<0)plats.push(pl);});});
    var dots=plats.map(function(pl){return pl==='xhs'?'<span class="sdot sdot-xhs">小</span>':'<span class="sdot sdot-tao">T</span>';}).join('');
    var prices=p.sellers.map(function(s){return parseFloat(s.cny);}).filter(function(n){return !isNaN(n);});
    var mc=prices.length?Math.min.apply(null,prices):null;
    var inCart=cart.has(p.id);
    return '<div class="pcard"><div class="pcard-img '+bg+'" onclick="openModal('+p.id+')" style="cursor:pointer">'+(img?'<img src="'+img+'" alt="'+p.name+'">':'<span class="pcard-emoji">'+getEmoji(p)+'</span>')+'<div class="sdots">'+dots+'</div></div><div class="pcard-body"><div class="pcard-cat">'+p.cat+'</div><div class="pcard-name" onclick="openModal('+p.id+')" style="cursor:pointer">'+p.name+'</div>'+(mc!==null?'<div class="pcard-price">'+fmtKrw(mc.toString())+'~</div>':'')+'<button class="pcard-add '+(inCart?'on':'off')+'" onclick="toggleCartFromGrid('+p.id+')">'+(inCart?'✓ 담겨있어요':'+ 담기')+'</button></div></div>';
  }).join('');
}

// 판매자 페이지
function renderSellerPage(){
  var frow=document.getElementById('sfilter-row');

        '</div>' +

    return '<div class="so-card"><div class="so-hd"><div class="so-av">'+s.av+'</div><div><div class="so-nm">'+s.name+'</div><div class="so-mt">'+s.meta+'</div></div>'+pb+'<div class="so-prices"><div class="so-krw">'+fmtKrw(sv.cny)+'</div><div class="so-cny">'+fmtCny(sv.cny)+'</div></div></div><div class="so-desc">'+s.desc+'</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px">'+s.tags.map(function(t){return '<span style="background:#fff5f8;border:1px solid #ffd6e7;border-radius:18px;padding:2px 7px;font-size:9px;color:#ff9dbf;font-weight:600">'+t+'</span>';}).join('')+'</div>'+note+'<div class="so-btn-row">'+lb+'</div></div>';
  }).join('');
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');document.body.style.overflow='';}

// 초기화
renderPickGrid();
renderGrid();
renderSellerPage();
</script>
